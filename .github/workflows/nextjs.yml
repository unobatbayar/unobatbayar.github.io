name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main  # Deploy on every push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'  # You can specify the Node version you want to use

    - name: Install dependencies
      run: |
        pnpm install

    - name: Build and export Next.js app
      run: |
        pnpm run build
        pnpm run export

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages  # The branch to deploy to (create if it doesn't exist)
        folder: out  # The folder containing the exported static files
        token: ${{ secrets.GITHUB_TOKEN }}  # GitHub token for authentication
